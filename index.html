<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Interview Flash Cards</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;700;800&display=swap');

  :root {
    --bg: #f0f0f8;
    --surface: #ffffff;
    --border: #d0d0e0;
    --accent-html: #e85d04;
    --accent-css: #0096c7;
    --accent-js: #d4a000;
    --accent-react: #0984e3;
    --accent-adv: #8e44ad;
    --text: #1a1a2e;
    --muted: #6b6b8a;
    --card-bg: #ffffff;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Syne', sans-serif;
    min-height: 100vh;
    padding: 2rem 1rem 4rem;
    background-image: 
      radial-gradient(ellipse at 20% 20%, rgba(232,93,4,0.06) 0%, transparent 60%),
      radial-gradient(ellipse at 80% 80%, rgba(9,132,227,0.06) 0%, transparent 60%);
  }

  h1 {
    text-align: center;
    font-size: clamp(1.6rem, 4vw, 2.8rem);
    font-weight: 800;
    letter-spacing: -0.03em;
    margin-bottom: 0.3rem;
    background: linear-gradient(135deg, #1a1a2e 40%, #6b6b8a);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .subtitle {
    text-align: center;
    color: var(--muted);
    font-family: 'Space Mono', monospace;
    font-size: 0.78rem;
    margin-bottom: 3rem;
    letter-spacing: 0.1em;
  }

  .sections {
    max-width: 900px;
    margin: 0 auto;
    display: flex;
    flex-direction: column;
    gap: 2rem;
  }

  .section {
    border: 1px solid var(--border);
    border-radius: 16px;
    overflow: hidden;
    background: var(--card-bg);
    transition: border-color 0.3s;
  }

  .section:hover { border-color: #b0b0cc; }

  .section-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 1.2rem 1.5rem;
    border-bottom: 1px solid var(--border);
    gap: 1rem;
  }

  .section-title {
    display: flex;
    align-items: center;
    gap: 0.7rem;
    font-weight: 800;
    font-size: 1.1rem;
    letter-spacing: -0.01em;
  }

  .badge {
    font-family: 'Space Mono', monospace;
    font-size: 0.6rem;
    font-weight: 700;
    padding: 0.2rem 0.55rem;
    border-radius: 999px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }

  .section[data-section="html"] .badge { background: rgba(255,107,53,0.15); color: var(--accent-html); }
  .section[data-section="css"]  .badge { background: rgba(0,212,170,0.15); color: var(--accent-css); }
  .section[data-section="js"]   .badge { background: rgba(247,201,72,0.15); color: var(--accent-js); }
  .section[data-section="react"]{ border-color: var(--border); }
  .section[data-section="react"] .badge { background: rgba(97,218,251,0.15); color: var(--accent-react); }
  .section[data-section="adv"]  .badge { background: rgba(192,132,252,0.15); color: var(--accent-adv); }

  .count-badge {
    font-family: 'Space Mono', monospace;
    font-size: 0.65rem;
    color: var(--muted);
    background: rgba(0,0,0,0.04);
    padding: 0.2rem 0.5rem;
    border-radius: 6px;
    border: 1px solid var(--border);
  }

  .btn-random {
    font-family: 'Space Mono', monospace;
    font-size: 0.7rem;
    font-weight: 700;
    letter-spacing: 0.06em;
    padding: 0.45rem 1rem;
    border-radius: 8px;
    border: none;
    cursor: pointer;
    transition: all 0.15s;
    text-transform: uppercase;
    flex-shrink: 0;
  }

  .section[data-section="html"] .btn-random { background: var(--accent-html); color: #000; }
  .section[data-section="css"]  .btn-random { background: var(--accent-css); color: #000; }
  .section[data-section="js"]   .btn-random { background: var(--accent-js); color: #000; }
  .section[data-section="react"] .btn-random { background: var(--accent-react); color: #000; }
  .section[data-section="adv"]  .btn-random { background: var(--accent-adv); color: #000; }

  .btn-random:hover { transform: scale(1.05); opacity: 0.9; }
  .btn-random:active { transform: scale(0.97); }

  .card-area {
    padding: 1.5rem;
    min-height: 120px;
    display: flex;
    flex-direction: column;
    gap: 0.75rem;
  }

  .question-display {
    flex: 1;
  }

  .q-number {
    font-family: 'Space Mono', monospace;
    font-size: 0.65rem;
    color: var(--muted);
    margin-bottom: 0.5rem;
    letter-spacing: 0.1em;
  }

  .q-text {
    font-size: clamp(1rem, 2.5vw, 1.25rem);
    font-weight: 700;
    line-height: 1.45;
    letter-spacing: -0.01em;
    animation: fadeSlide 0.25s ease;
  }

  @keyframes fadeSlide {
    from { opacity: 0; transform: translateY(6px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .q-hint {
    font-family: 'Space Mono', monospace;
    font-size: 0.68rem;
    color: var(--muted);
    margin-top: 0.4rem;
    font-style: italic;
  }

  .progress-row {
    display: flex;
    align-items: center;
    gap: 0.75rem;
    margin-top: 0.5rem;
  }

  .progress-bar-wrap {
    flex: 1;
    height: 3px;
    background: var(--border);
    border-radius: 999px;
    overflow: hidden;
  }

  .progress-bar {
    height: 100%;
    border-radius: 999px;
    transition: width 0.4s ease;
  }

  .section[data-section="html"] .progress-bar { background: var(--accent-html); }
  .section[data-section="css"]  .progress-bar { background: var(--accent-css); }
  .section[data-section="js"]   .progress-bar { background: var(--accent-js); }
  .section[data-section="react"] .progress-bar { background: var(--accent-react); }
  .section[data-section="adv"]  .progress-bar { background: var(--accent-adv); }

  .progress-text {
    font-family: 'Space Mono', monospace;
    font-size: 0.6rem;
    color: var(--muted);
    white-space: nowrap;
  }

  .all-btn-wrap {
    text-align: center;
    margin-top: 1rem;
  }

  .btn-all {
    font-family: 'Space Mono', monospace;
    font-size: 0.72rem;
    font-weight: 700;
    letter-spacing: 0.1em;
    padding: 0.7rem 2rem;
    border-radius: 10px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--text);
    cursor: pointer;
    transition: all 0.2s;
    text-transform: uppercase;
  }

  .btn-all:hover { background: rgba(0,0,0,0.06); border-color: #b0b0cc; }
</style>
</head>
<body>

<h1>Interview Flash Cards</h1>
<p class="subtitle">// random câu hỏi phỏng vấn frontend</p>

<div class="sections" id="app"></div>

<div class="all-btn-wrap">
  <button class="btn-all" onclick="randomAll()">⚡ Random tất cả</button>
</div>

<script>
const data = {
  html: {
    label: "HTML",
    questions: [
      { q: "Semantics là gì?", hint: "Ý nghĩa của thẻ HTML với trình duyệt & SEO" },
      { q: "span vs div — khác nhau như nào?", hint: "inline vs block element" },
      { q: "Thẻ <meta> dùng làm gì?", hint: "charset, viewport, og:, description..." },
      { q: "Thuộc tính defer và async trên thẻ <script> là gì?", hint: "thứ tự tải & thực thi JS" },
      { q: "Một trang web có thể chứa nhiều thẻ <header> hay <footer> không?", hint: "HTML5 semantic, per-section" },
      { q: "srcset trong thẻ <img> dùng làm gì?", hint: "responsive images, DPR, breakpoint" },
      { q: "Web Components là gì? Shadow DOM là gì?", hint: "Custom Elements, Shadow DOM, HTML Templates" },
      { q: "HTML5 có gì mới? Kể 1 số thẻ mới.", hint: "<article>, <section>, <canvas>, <video>, <details>..." },
      { q: "<iframe> dùng làm gì? Lưu ý gì?", hint: "embed, sandbox, security, performance" },
      { q: "div vs section — khi nào dùng cái nào?", hint: "semantic vs generic container" },
    ]
  },
  css: {
    label: "CSS",
    questions: [
      { q: "position trong CSS: static, relative, absolute, fixed, sticky.", hint: "stacking context, parent reference" },
      { q: "box-sizing là gì? content-box vs border-box?", hint: "width bao gồm padding & border không?" },
      { q: "inline vs inline-block vs block — khác nhau?", hint: "flow, width/height, margin" },
      { q: "3 cách để định nghĩa màu trong CSS?", hint: "hex, rgb/rgba, hsl/hsla, named..." },
      { q: "Những cách đưa 1 phần tử vào giữa trang?", hint: "flexbox, grid, margin auto, position+transform" },
      { q: "margin vs padding — khác nhau?", hint: "outside vs inside, collapse, background" },
      { q: "display:none vs visibility:hidden vs opacity:0 — khác nhau?", hint: "layout space, events, accessibility" },
      { q: "Điểm khác biệt giữa width:auto và width:100%?", hint: "shrink-wrap vs parent width" },
      { q: "grid vs flexbox — khi nào dùng cái nào?", hint: "2D vs 1D layout" },
      { q: "px vs em vs rem — khác nhau?", hint: "absolute, parent-relative, root-relative" },
      { q: "z-index hoạt động khi nào?", hint: "cần position khác static, stacking context" },
      { q: "Giải thích các CSS selectors: div,p / div p / div>p / div+p / div~p", hint: "group / descendant / child / adjacent / sibling" },
      { q: "BEM là gì? Cách đặt tên theo BEM?", hint: "Block__Element--Modifier" },
      { q: "Có mấy cách để sử dụng CSS trên trang web?", hint: "inline, internal <style>, external <link>" },
      { q: "CSS có phân biệt hoa thường không?", hint: "selector không, nhưng attribute value thì có" },
    ]
  },
  js: {
    label: "JS / TS",
    questions: [
      { q: "Closure là gì? Cho ví dụ.", hint: "inner function nhớ scope của outer function" },
      { q: "Currying là gì?", hint: "f(a,b,c) → f(a)(b)(c)" },
      { q: "bind / call / apply — khác nhau?", hint: "đều thay this, call/apply gọi ngay, bind trả function" },
      { q: "var vs let vs const — khác nhau?", hint: "scope, hoisting, reassign, temporal dead zone" },
      { q: "Shallow clone vs Deep clone?", hint: "Object.assign, spread vs structuredClone, JSON, lodash" },
      { q: "Callback là gì? Promise? Async/await? So sánh.", hint: "callback hell → Promise chain → async/await syntax" },
      { q: "Event loop hoạt động như thế nào?", hint: "call stack, task queue, microtask queue, Web APIs" },
      { q: "type vs interface trong TypeScript?", hint: "extends, declaration merge, union type..." },
      { q: "Cho 2 object a và b, so sánh a === b trả về gì? Vì sao?", hint: "reference equality vs value equality" },
      { q: "== vs === — khác nhau?", hint: "type coercion vs strict equality" },
      { q: "Higher Order Function là gì? Cho ví dụ.", hint: "nhận hoặc trả về function: map, filter, reduce" },
      { q: "splice vs split vs slice — khác nhau?", hint: "splice: array mutate / split: string→array / slice: copy" },
      { q: "Cookie vs SessionStorage vs LocalStorage — khác nhau?", hint: "expiry, size, HTTPOnly, SameSite, Secure" },
      { q: "map vs forEach vs for loop — khi nào dùng cái nào?", hint: "return value, break, performance" },
      { q: "Các kiểu dữ liệu (data type) trong JavaScript?", hint: "primitive: string, number, boolean, null, undefined, symbol, bigint" },
      { q: "So sánh map, forEach, filter, reduce — khi nào dùng cái nào?", hint: "transform / side-effect / filter / accumulate" },
      { q: "Event bubbling là gì?", hint: "propagation từ child lên parent, stopPropagation, capture phase" },
    ]
  },
  react: {
    label: "React",
    questions: [
      { q: "useCallback, useMemo, React.memo — khi nào dùng?", hint: "memoize function / value / component" },
      { q: "useLayoutEffect vs useEffect — khác nhau?", hint: "timing: before/after paint" },
      { q: "Virtual DOM vs Real DOM là gì?", hint: "giải thích DOM trước, rồi diff/reconciliation" },
      { q: "key trong React dùng làm gì?", hint: "reconciliation, tránh re-render sai" },
      { q: "useRef và useImperativeHandle dùng làm gì?", hint: "DOM ref, expose method cho parent" },
      { q: "Next.js là gì và vì sao dùng?", hint: "SSR, SSG, routing, image optimization, DX" },
      { q: "CSR vs SSR vs SSG vs ISR — khác nhau?", hint: "when/where HTML is generated" },
      { q: "Higher Order Component vs Custom Hook — khác nhau?", hint: "wrapper component vs reusable logic" },
      { q: "Context API (useContext) dùng như nào?", hint: "createContext, Provider, Consumer, re-render" },
      { q: "return trong useEffect dùng làm gì?", hint: "cleanup function, unmount, dependency change" },
      { q: "Controlled vs Uncontrolled component?", hint: "state in React vs ref/DOM" },
      { q: "forwardRef dùng làm gì? (bị bỏ ở React 19)", hint: "pass ref từ parent xuống child component" },
    ]
  },
  adv: {
    label: "Nâng Cao",
    questions: [
      { q: "CORS là gì? Khi dính CORS thì làm gì?", hint: "Origin, preflight, Access-Control-Allow-Origin, proxy" },
      { q: "Redux vs Zustand/Jotai — khi nào dùng cái nào?", hint: "boilerplate, project size, DX" },
      { q: "Handle error API như thế nào?", hint: "try/catch, interceptor, error boundary, retry" },
      { q: "Multi-language (i18n) trong web như nào?", hint: "i18next, hreflang, lang attr, URL /vi /en, sitemap" },
      { q: "Refresh token hoạt động như thế nào?", hint: "access token expire → dùng refresh token lấy token mới" },
      { q: "AbortController dùng làm gì?", hint: "cancel fetch request, cleanup trong useEffect" },
      { q: "Repaint vs Reflow — khác nhau?", hint: "reflow: layout change / repaint: visual change" },
      { q: "useReducer dùng khi nào? So sánh với useState?", hint: "complex state logic, dispatch action" },
      { q: "Tối ưu ảnh trong web bằng cách nào?", hint: "WebP/AVIF, lazy load, CDN, srcset, nén, preload" },
      { q: "Promise.all vs Promise.race vs Promise.allSettled vs Promise.any?", hint: "all fail fast / race first / allSettled no fail / any first success" },
      { q: "<picture> vs srcset — khác nhau?", hint: "picture: art direction / srcset: resolution switching" },
    ]
  }
};

// Track seen questions per section
const state = {};

function init() {
  const app = document.getElementById('app');
  
  Object.entries(data).forEach(([key, section]) => {
    state[key] = { seen: new Set(), current: null };
    
    const el = document.createElement('div');
    el.className = 'section';
    el.dataset.section = key;
    el.innerHTML = `
      <div class="section-header">
        <div class="section-title">
          <span class="badge">${section.label}</span>
          <span class="count-badge">${section.questions.length} câu</span>
        </div>
        <button class="btn-random" onclick="randomQ('${key}')">Random</button>
      </div>
      <div class="card-area" id="card-${key}">
        <div class="question-display">
          <div class="q-number" id="qnum-${key}">Bấm Random để bắt đầu</div>
          <div class="q-text" id="qtext-${key}" style="color:var(--muted);font-weight:400;font-size:1rem">— chờ câu hỏi —</div>
          <div class="q-hint" id="qhint-${key}"></div>
        </div>
        <div class="progress-row">
          <div class="progress-bar-wrap">
            <div class="progress-bar" id="qbar-${key}" style="width:0%"></div>
          </div>
          <div class="progress-text" id="qprog-${key}">0 / ${section.questions.length}</div>
        </div>
      </div>
    `;
    app.appendChild(el);
  });
}

function randomQ(key) {
  const section = data[key];
  const s = state[key];
  
  // Reset if all seen
  if (s.seen.size >= section.questions.length) {
    s.seen.clear();
  }
  
  const unseen = section.questions
    .map((q, i) => i)
    .filter(i => !s.seen.has(i));
  
  const idx = unseen[Math.floor(Math.random() * unseen.length)];
  s.seen.add(idx);
  s.current = idx;
  
  const q = section.questions[idx];
  
  // Update DOM
  const numEl = document.getElementById(`qnum-${key}`);
  const textEl = document.getElementById(`qtext-${key}`);
  const hintEl = document.getElementById(`qhint-${key}`);
  const barEl  = document.getElementById(`qbar-${key}`);
  const progEl = document.getElementById(`qprog-${key}`);
  
  numEl.textContent = `Câu ${idx + 1} / ${section.questions.length}`;
  
  // Re-trigger animation
  textEl.style.animation = 'none';
  textEl.offsetHeight; // reflow
  textEl.style.animation = '';
  textEl.style.color = '';
  textEl.style.fontWeight = '';
  textEl.style.fontSize = '';
  textEl.textContent = q.q;
  
  hintEl.textContent = q.hint ? `💡 ${q.hint}` : '';
  
  const pct = (s.seen.size / section.questions.length) * 100;
  barEl.style.width = pct + '%';
  progEl.textContent = `${s.seen.size} / ${section.questions.length}`;
}

function randomAll() {
  Object.keys(data).forEach(key => randomQ(key));
}

init();
</script>
</body>
</html>
